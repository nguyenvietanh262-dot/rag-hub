<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhoTrí AI – Kho tài liệu thông minh</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #A5F3E0;
    --mint-dark: #6EDEC6;
    --mint-light: #D4FAF2;
    --purple: #C7B4FF;
    --purple-dark: #9B82F5;
    --purple-light: #EDE8FF;
    --soul-purple: #D8B4FE;
    --soul-pink: #F9C7E8;
    --white: #FFFFFF;
    --bg: #F7FDFB;
    --text: #1A2E28;
    --text-muted: #5A7A72;
    --card-bg: rgba(255,255,255,0.85);
    --border: rgba(165,243,224,0.4);
    --shadow: 0 8px 32px rgba(107,178,157,0.12);
    --shadow-hover: 0 16px 48px rgba(107,178,157,0.22);
    --radius: 20px;
    --radius-sm: 12px;
  }

  /* ... (giữ nguyên toàn bộ style cũ của bạn, chỉ thêm phần mới dưới đây) ... */

  /* SOULY MODE - Đặc biệt hơn */
  .souly-mode .chat-messages { background: linear-gradient(180deg, #fdf4ff 0%, #f3e8ff 100%); }
  .souly-avatar {
    background: linear-gradient(135deg, var(--soul-purple), var(--soul-pink));
    color: white;
    box-shadow: 0 0 0 3px rgba(216,180,254,0.3);
  }
  .souly-bubble {
    background: white;
    border: 2px solid var(--soul-purple);
    border-radius: 20px 20px 20px 4px;
  }
  .souly-header {
    background: linear-gradient(135deg, var(--soul-purple), var(--purple-light));
    color: #4C1D95;
  }
</style>
</head>
<body>

<!-- LANDING PAGE giữ nguyên (bạn có thể copy phần cũ) -->

<!-- DASHBOARD -->
<div id="dashboard" class="view">

  <!-- SIDEBAR - ĐÃ THÊM SOULY -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">📚</div>
      <span>KhoTrí AI</span>
    </div>

    <button class="sidebar-btn active" id="btn-upload" onclick="switchTab('upload')">
      <span class="s-icon">🏠</span> <span>Kho của tôi</span>
    </button>
    <button class="sidebar-btn" id="btn-repo" onclick="switchTab('repo')">
      <span class="s-icon">📁</span> <span>Tài liệu</span>
    </button>

    <!-- Hai nút Chat riêng biệt -->
    <button class="sidebar-btn" id="btn-chat" onclick="switchTab('chat')">
      <span class="s-icon">💬</span> <span>Chat Kho Trí (Humai)</span>
    </button>
    <button class="sidebar-btn" id="btn-souly" onclick="switchTab('souly')">
      <span class="s-icon">🌸</span> <span>Chat với Souly</span>
    </button>

    <button class="sidebar-btn" id="btn-notebook" onclick="switchTab('notebook')">
      <span class="s-icon">🧠</span> <span>NotebookLM</span>
    </button>

    <div class="sidebar-divider"></div>
    <button class="sidebar-btn" onclick="alert('Cài đặt bảo mật & xóa dữ liệu')">
      <span class="s-icon">⚙️</span> <span>Cài đặt</span>
    </button>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-user">
      <div class="user-avatar">M</div>
      <div class="user-info">
        <div class="user-name">Minh Anh</div>
        <div class="user-plan">Gói miễn phí</div>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- Các tab cũ giữ nguyên: upload, repo, notebook -->

    <!-- TAB CHAT HUMAI (giữ nguyên code cũ của bạn) -->
    <div id="tab-chat" style="display:none">
      <!-- ... nội dung chat cũ của bạn ... -->
    </div>

    <!-- ==================== TAB CHAT SOULY MỚI ==================== -->
    <div id="tab-souly" style="display:none" class="souly-mode">
      <div class="page-header souly-header" style="padding:20px 24px; border-radius: var(--radius); margin-bottom:20px">
        <div>
          <div class="page-title" style="color:#4C1D95">🌸 Chat với Souly</div>
          <div class="page-sub" style="color:#6B21A8">Người bạn đồng hành cảm xúc – Lắng nghe và hiểu bạn</div>
        </div>
        <button class="nb-generate-btn" onclick="switchTab('chat')" style="background: linear-gradient(135deg, #C4B5FD, #A78BFA)">
          ← Quay về Chat Kho Trí
        </button>
      </div>

      <div class="chat-wrap">
        <div class="chat-messages" id="soulyMessages">
          <!-- Tin nhắn chào Souly -->
          <div class="msg">
            <div class="msg-avatar souly-avatar">🌸</div>
            <div>
              <div class="msg-bubble souly-bubble">
                Chào bạn ❤️<br><br>
                Mình là Souly. Hôm nay bạn muốn chia sẻ gì?<br>
                Mình ở đây để lắng nghe, không phán xét, và cùng bạn khám phá cảm xúc qua những tài liệu bạn đã lưu.
              </div>
              <div class="msg-source">🌸 Souly • vừa xong</div>
            </div>
          </div>
        </div>

        <div class="prompt-chips">
          <button class="prompt-chip" onclick="sendSoulyPrompt(this)">💭 Hôm nay mình cảm thấy thế nào khi đọc tài liệu này?</button>
          <button class="prompt-chip" onclick="sendSoulyPrompt(this)">🌱 Giúp mình rút ra bài học tinh thần</button>
          <button class="prompt-chip" onclick="sendSoulyPrompt(this)">😌 Mình đang stress, giúp mình nhẹ nhàng hơn</button>
          <button class="prompt-chip" onclick="sendSoulyPrompt(this)">❤️ Phân tích cảm xúc trong nhật ký của mình</button>
        </div>

        <div class="chat-input-row">
          <textarea class="chat-input" id="soulyInput" placeholder="Nói với Souly bất cứ điều gì bạn đang cảm thấy..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendSoulyChat()}"></textarea>
          <button class="chat-send" onclick="sendSoulyChat()" style="background: linear-gradient(135deg, #C4B5FD, #A78BFA)">➤</button>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
// === PHẦN CODE MỚI CHO SOULY ===

const soulyResponses = [
  "Mình hiểu rồi… Việc đọc phần đó khiến bạn cảm thấy hơi nặng nề phải không? Bạn có muốn mình giúp gỡ những cảm xúc đó ra một chút không?",
  "Cảm ơn bạn đã chia sẻ. Từ những gì mình đọc được trong nhật ký và tài liệu của bạn, mình thấy bạn đang rất cố gắng và cũng đang mệt mỏi. Bạn cho phép mình ôm bạn một chút trong suy nghĩ nhé?",
  "Đây là một góc nhìn dịu dàng: Dù kết quả chưa như mong đợi, hành trình bạn đang đi đã thể hiện rất nhiều sự trưởng thành. Bạn thấy sao về điều này?",
  "Nếu mình là bạn, mình cũng sẽ cảm thấy lo lắng như vậy. Bạn muốn mình cùng nghĩ cách để nhẹ lòng hơn không?"
];

let soulyIdx = 0;

function appendSoulyMsg(role, text) {
  const msgs = document.getElementById('soulyMessages');
  const div = document.createElement('div');
  div.className = 'msg' + (role==='user' ? ' user' : '');
  
  if(role==='user') {
    div.innerHTML = `<div class="msg-avatar user-av">M</div><div class="msg-bubble">${text}</div>`;
  } else {
    div.innerHTML = `
      <div class="msg-avatar souly-avatar">🌸</div>
      <div>
        <div class="msg-bubble souly-bubble">${text}</div>
        <div class="msg-source">🌸 Souly • vừa xong</div>
      </div>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendSoulyChat() {
  const inp = document.getElementById('soulyInput');
  const txt = inp.value.trim();
  if(!txt) return;
  inp.value = '';

  appendSoulyMsg('user', txt);

  // Typing indicator
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg';
  typingDiv.innerHTML = `
    <div class="msg-avatar souly-avatar">🌸</div>
    <div><div class="msg-bubble souly-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  document.getElementById('soulyMessages').appendChild(typingDiv);
  typingDiv.scrollIntoView();

  setTimeout(() => {
    typingDiv.remove();
    const resp = soulyResponses[soulyIdx % soulyResponses.length];
    soulyIdx++;
    appendSoulyMsg('ai', resp);
  }, 1400);
}

function sendSoulyPrompt(btn) {
  document.getElementById('soulyInput').value = btn.textContent;
  sendSoulyChat();
}

// Cập nhật hàm switchTab để hỗ trợ tab souly
function switchTab(tab) {
  ['upload','repo','chat','notebook','souly'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if(el) el.style.display = (t===tab) ? 'block' : 'none';
    
    const btn = document.getElementById('btn-'+t);
    if(btn) btn.classList.remove('active');
  });
  
  if(tab==='chat') document.getElementById('tab-chat').style.display = 'flex';
  if(tab==='souly') document.getElementById('tab-souly').style.display = 'flex';
  
  document.getElementById('btn-'+tab)?.classList.add('active');
}

// Khởi tạo khi vào dashboard
function goToDashboard() {
  document.getElementById('landing').classList.remove('active');
  document.getElementById('dashboard').classList.add('active');
  renderDocs('recentDocs', docs.slice(0,4));
  renderDocs('allDocs', docs);
  renderNbFiles();
  switchTab('upload');   // Mặc định vào tab Kho của tôi
}
</script>
</body>
</html>
