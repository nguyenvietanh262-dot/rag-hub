<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KhoTrí AI – Kho tài liệu thông minh</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap');
    
    body { font-family: 'Quicksand', system-ui, sans-serif; }
    .logo-font { font-family: 'DM Serif Display', serif; }

    .chat-bubble-humai { background-color: #ecfdf5; border-color: #6EE7B7; }
    .chat-bubble-souly { background-color: #fdf4ff; border: 2px solid #d8b4fe; }
  </style>
</head>
<body class="bg-[#f8fafc]">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-72 bg-white border-r border-base-200 flex flex-col">
    <div class="p-6 border-b flex items-center gap-3">
      <div class="w-11 h-11 bg-gradient-to-br from-[#A5F3E0] to-[#C4B5FD] rounded-2xl flex items-center justify-center text-3xl">📚</div>
      <span class="logo-font text-3xl font-bold text-gray-800">KhoTrí AI</span>
    </div>

    <div class="flex-1 p-4 space-y-1">
      <button onclick="switchTab('upload')" id="btn-upload" class="sidebar-btn w-full flex items-center gap-3 px-5 py-3.5 rounded-2xl active">
        <span class="text-2xl">🏠</span><span>Kho của tôi</span>
      </button>
      <button onclick="switchTab('repo')" id="btn-repo" class="sidebar-btn w-full flex items-center gap-3 px-5 py-3.5 rounded-2xl">
        <span class="text-2xl">📁</span><span>Tài liệu</span>
      </button>
      <button onclick="switchTab('chat')" id="btn-chat" class="sidebar-btn w-full flex items-center gap-3 px-5 py-3.5 rounded-2xl">
        <span class="text-2xl">💬</span><span>Chat Kho Trí (Humai)</span>
      </button>
      <button onclick="switchTab('souly')" id="btn-souly" class="sidebar-btn w-full flex items-center gap-3 px-5 py-3.5 rounded-2xl">
        <span class="text-2xl">🌸</span><span>Chat với Souly</span>
      </button>
      <button onclick="switchTab('notebook')" id="btn-notebook" class="sidebar-btn w-full flex items-center gap-3 px-5 py-3.5 rounded-2xl">
        <span class="text-2xl">🧠</span><span>NotebookLM</span>
      </button>
    </div>

    <div class="p-4 border-t">
      <div class="flex items-center gap-3 bg-base-100 p-3 rounded-3xl">
        <div class="w-9 h-9 bg-gradient-to-br from-[#A5F3E0] to-[#C4B5FD] rounded-2xl flex items-center justify-center text-white font-bold">M</div>
        <div>
          <div class="font-semibold">Minh Anh</div>
          <div class="text-xs text-gray-500">Gói miễn phí</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="flex-1 flex flex-col">
    <div class="h-14 border-b bg-white px-8 flex items-center justify-between">
      <div class="text-xl font-medium" id="page-title">Kho của tôi</div>
      <div class="flex gap-3">
        <button class="btn btn-ghost btn-sm">Hỗ trợ</button>
        <button class="btn btn-primary btn-sm">Nâng cấp</button>
      </div>
    </div>

    <div class="flex-1 p-8 overflow-auto">

      <!-- TAB UPLOAD -->
      <div id="tab-upload">
        <h1 class="text-4xl font-bold mb-2">Kho của tôi</h1>
        <p class="text-gray-600 mb-8">Hiện có <span id="doc-count" class="font-semibold text-emerald-600">0</span> tài liệu</p>

        <div onclick="document.getElementById('fileInput').click()" 
             class="border-2 border-dashed border-[#6EDEC6] rounded-3xl p-12 text-center hover:bg-[#f0fdfa] cursor-pointer transition-all">
          <div class="text-6xl mb-4">☁️</div>
          <h3 class="text-xl font-semibold mb-2">Kéo thả file vào đây</h3>
          <p class="text-gray-500">hoặc click để chọn file</p>
          <p class="text-xs text-gray-400 mt-4">PDF, DOCX, TXT, JPG, PNG</p>
          <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this)">
        </div>

        <div id="docs-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-10"></div>
      </div>

      <!-- TAB CHAT HUMAI -->
      <div id="tab-chat" class="hidden">
        <h1 class="text-3xl font-bold mb-6">Chat với Kho Trí (Humai)</h1>
        <div class="bg-white rounded-3xl shadow-sm border h-[calc(100vh-180px)] flex flex-col">
          <div class="flex-1 p-6 overflow-y-auto" id="humaiMessages"></div>
          <div class="p-4 border-t">
            <div class="flex gap-2">
              <input id="humaiInput" type="text" placeholder="Hỏi về tài liệu của bạn..." 
                     class="input input-bordered flex-1 rounded-2xl" onkeypress="if(event.key==='Enter') sendHumai()">
              <button onclick="sendHumai()" class="btn btn-primary rounded-2xl">Gửi</button>
            </div>
          </div>
        </div>
      </div>

      <!-- TAB CHAT SOULY -->
      <div id="tab-souly" class="hidden">
        <h1 class="text-3xl font-bold mb-6 flex items-center gap-3"><span class="text-4xl">🌸</span> Chat với Souly</h1>
        <div class="bg-gradient-to-b from-[#fdf4ff] to-white rounded-3xl shadow-sm border border-[#d8b4fe] h-[calc(100vh-180px)] flex flex-col">
          <div class="flex-1 p-6 overflow-y-auto" id="soulyMessages"></div>
          <div class="p-4 border-t bg-white rounded-b-3xl">
            <div class="flex gap-2">
              <input id="soulyInput" type="text" placeholder="Nói với Souly về cảm xúc của bạn..." 
                     class="input input-bordered flex-1 rounded-2xl" onkeypress="if(event.key==='Enter') sendSouly()">
              <button onclick="sendSouly()" class="btn rounded-2xl" style="background:#d8b4fe;color:#4c1d95">Gửi</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ==================== CẤU HÌNH GEMINI ====================
const GEMINI_API_KEY = "AIzaSyAeegiJjMq5jtRwr0x5MLLNy6FcCUbRqsA";   // ←←← THAY API KEY GEMINI CỦA BẠN VÀO ĐÂY

let documents = JSON.parse(localStorage.getItem('khotri_docs') || '[]');

// Render danh sách tài liệu
function renderDocs() {
  const container = document.getElementById('docs-list');
  container.innerHTML = documents.map(doc => `
    <div class="card bg-white border border-base-200 hover:shadow-md transition-all">
      <div class="card-body">
        <div class="text-4xl mb-3">${doc.icon}</div>
        <h3 class="font-semibold text-base line-clamp-2">${doc.name}</h3>
        <p class="text-xs text-gray-500">${new Date(doc.date).toLocaleDateString('vi-VN')}</p>
      </div>
    </div>
  `).join('');
  
  document.getElementById('doc-count').textContent = documents.length;
}

// Xử lý upload file
function handleFiles(input) {
  const files = input.files;
  for (let file of files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const newDoc = {
        id: Date.now(),
        name: file.name,
        icon: file.type.includes('pdf') ? '📄' : file.type.includes('image') ? '🖼️' : '📝',
        content: e.target.result.substring(0, 15000), // Giới hạn độ dài
        date: new Date().toISOString(),
        type: file.type
      };
      
      documents.unshift(newDoc);
      localStorage.setItem('khotri_docs', JSON.stringify(documents));
      renderDocs();
      showToast(`✅ Đã thêm "${file.name}"`);
    };
    reader.readAsText(file);
  }
}

// Gọi Gemini API
async function callGemini(prompt, systemPrompt = "") {
  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: systemPrompt ? `${systemPrompt}\n\n${prompt}` : prompt }
          ]
        }]
      })
    });

    const data = await response.json();
    return data.candidates[0].content.parts[0].text || "Không nhận được phản hồi.";
  } catch (err) {
    console.error(err);
    return "❌ Lỗi kết nối Gemini. Vui lòng kiểm tra API Key.";
  }
}

// Chat Humai (Logic)
async function sendHumai() {
  const input = document.getElementById('humaiInput');
  if (!input.value.trim()) return;

  const messages = document.getElementById('humaiMessages');
  messages.innerHTML += `<div class="chat chat-end"><div class="chat-bubble">${input.value}</div></div>`;
  
  const loadingHTML = `<div class="chat chat-start"><div class="chat-bubble chat-bubble-humai">Đang suy nghĩ...</div></div>`;
  messages.innerHTML += loadingHTML;
  messages.scrollTop = messages.scrollHeight;

  const system = "Bạn là Humai - trợ lý AI thực tế, logic, giúp phân tích tài liệu một cách rõ ràng, ngắn gọn và chính xác.";
  const reply = await callGemini(input.value, system);
  
  messages.innerHTML = messages.innerHTML.replace("Đang suy nghĩ...", reply);
  messages.scrollTop = messages.scrollHeight;
  input.value = '';
}

// Chat Souly (Cảm xúc)
async function sendSouly() {
  const input = document.getElementById('soulyInput');
  if (!input.value.trim()) return;

  const messages = document.getElementById('soulyMessages');
  messages.innerHTML += `<div class="chat chat-end"><div class="chat-bubble bg-emerald-100">${input.value}</div></div>`;

  const loadingHTML = `<div class="chat chat-start"><div class="chat-bubble chat-bubble-souly">Đang lắng nghe bạn...</div></div>`;
  messages.innerHTML += loadingHTML;
  messages.scrollTop = messages.scrollHeight;

  const systemSouly = "Bạn là Souly - người bạn đồng hành cảm xúc ấm áp, dịu dàng, không phán xét. Luôn lắng nghe trước, dùng ngôn ngữ nhẹ nhàng, khích lệ và hỗ trợ sức khỏe tinh thần.";
  const reply = await callGemini(input.value, systemSouly);

  messages.innerHTML = messages.innerHTML.replace("Đang lắng nghe bạn...", reply);
  messages.scrollTop = messages.scrollHeight;
  input.value = '';
}

// Utility
function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-2xl shadow-xl text-sm z-50";
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function switchTab(tab) {
  document.querySelectorAll('#main-content > div').forEach(div => div.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');

  document.querySelectorAll('.sidebar-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btn-' + tab).classList.add('active');

  document.getElementById('page-title').textContent = 
    tab === 'upload' ? 'Kho của tôi' :
    tab === 'chat' ? 'Chat Kho Trí (Humai)' :
    tab === 'souly' ? 'Chat với Souly' : 'NotebookLM';
}

// Khởi tạo
document.addEventListener('DOMContentLoaded', () => {
  renderDocs();
  switchTab('upload');
  
  // Welcome message Souly
  document.getElementById('soulyMessages').innerHTML = `
    <div class="chat chat-start">
      <div class="chat-bubble chat-bubble-souly">
        Chào bạn ❤️<br><br>
        Mình là Souly. Hôm nay bạn muốn chia sẻ cảm xúc gì với mình?
      </div>
    </div>
  `;
});
</script>
</body>
</html>
